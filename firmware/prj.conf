# --- Zephyr Shell over UART (USART2) ---
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Hardware subsystems ---
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y

# --- Logging / diagnostics ---
CONFIG_LOG=y
CONFIG_SHELL_HELP=y

# Keep the shell prompt clean for machine parsing on the host side
CONFIG_SHELL_PROMPT_UART="uart> "
